<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640">
  <rect width="640" height="640" rx="96" fill="#2d2d2d"/>
  <!-- Monitor -->
  <rect x="120" y="120" width="400" height="280" rx="24" fill="#1a1a1a" stroke="#555" stroke-width="12"/>
  <!-- Screen -->
  <rect x="148" y="148" width="344" height="224" rx="8" fill="#0d1117"/>
  <!-- Terminal prompt lines -->
  <text x="180" y="220" font-family="monospace" font-size="48" font-weight="bold" fill="#4ec9b0">&gt;_</text>
  <rect x="180" y="260" width="200" height="6" rx="3" fill="#555"/>
  <rect x="180" y="290" width="140" height="6" rx="3" fill="#444"/>
  <rect x="180" y="320" width="240" height="6" rx="3" fill="#444"/>
  <!-- Stand -->
  <rect x="270" y="400" width="100" height="40" rx="4" fill="#555"/>
  <rect x="220" y="440" width="200" height="16" rx="8" fill="#555"/>
  <!-- Label -->
  <text x="320" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ccc" text-anchor="middle">LOCAL</text>
</svg>
